<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Computer</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="layout">
      <header class="header">
        <h1>Local Computer</h1>
        <p class="sub">
          Sandbox Debian (Docker) + workspace lokal. Model: lihat <code>.env</code> —
          Perplexity membutuhkan kunci API terpisah dari Max.
        </p>
      </header>
      <main class="main">
        <section class="chat" id="log"></section>
        <form class="composer" id="form">
          <textarea
            id="input"
            rows="3"
            placeholder="Tanya atau minta tugas di /workspace…"
            required
          ></textarea>
          <button type="submit" id="send">Kirim</button>
        </form>
      </main>
    </div>
    <script src="/static/app.js" defer></script>
  </body>
</html>
